<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Supply Chain Intelligence Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo-section">
            <h2>SCIP</h2>
            <p>Supply Chain Intelligence</p>
        </div>

        <nav>
            <ul>

                <li>
                    <a href="/">
                        📊 Dashboard
                    </a>
                </li>

                <li>
                    <a href="/upload">
                        📁 Data Upload
                    </a>
                </li>

                <li>
                    <a href="/preprocess">
                        🧹 Preprocessing
                    </a>
                </li>

                <li>
                    <a href="/eda">
                        📈 EDA Analysis
                    </a>
                </li>

                <li>
                    <a href="/training">
                        🤖 Model Training
                    </a>
                </li>

                <li>
                    <a href="/forecasting">
                        📉 Forecasting
                    </a>
                </li>

                <li>
                    <a href="/inventory">
                        📦 Inventory
                    </a>
                </li>

                <li>
                    <a href="/reports">
                        📄 Reports
                    </a>
                </li>

            </ul>
        </nav>

    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Top Bar -->
        <div class="topbar">

            <div>
                <h4 class="mb-0">
                    Sales Forecasting & Inventory Optimization
                </h4>
            </div>

            <div>
                <span class="badge bg-primary">
                    Enterprise Edition
                </span>
            </div>

        </div>

        <!-- Dynamic Page Content -->
        <div class="content-area">

            {% block content %}
            {% endblock %}

        </div>

    </main>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>

</html>
