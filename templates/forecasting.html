{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">
    Sales Forecasting Dashboard
</h2>

{% if message %}

<div class="alert alert-warning">
    {{ message }}
</div>

{% endif %}

{% if preview %}

<div class="card p-4 mb-4">

    <h4>
        Forecast Results
    </h4>

    <div class="table-responsive">
        {{ preview|safe }}
    </div>

</div>

<div class="card p-4">

    <h4>
        Forecast Visualization
    </h4>

    {{ chart|safe }}

</div>

<a
href="/static/uploads/forecast.csv"
download
class="btn btn-success mt-4">

Download Forecast CSV

</a>

{% endif %}

{% endblock %}
